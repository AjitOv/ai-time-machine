version: "3.8"

services:
  backend:
    build: ./backend
    container_name: timemachine-api
    ports:
      - "8000:8000"
    volumes:
      - timemachine-data:/app/data
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///data/timemachine.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: timemachine-ui
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  timemachine-data:
